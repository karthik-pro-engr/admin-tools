name: Apply Branch Protection (Admin)

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'Repository owner (username/org)'
        required: true
      repo:
        description: 'Repository name'
        required: true
      branch:
        description: 'Branch name (default main)'
        required: false
        default: 'main'
      status_check:
        description: 'Exact status check name to require on PRs (optional)'
        required: false

permissions:
  contents: read
  actions: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout admin repo
        uses: actions/checkout@v4

      - name: Ensure script is present & executable
        run: |
          ls -la scripts || true
          chmod +x ./scripts/apply_classic_protection.sh

      - name: Apply branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_PAT }}   # admin PAT stored in admin-tools repo secrets
        run: |
          ./scripts/apply_classic_protection.sh "${{ github.event.inputs.owner }}" "${{ github.event.inputs.repo }}" "${{ github.event.inputs.branch }}" "${{ github.event.inputs.status_check }}"
