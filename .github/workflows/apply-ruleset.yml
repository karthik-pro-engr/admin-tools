name: Apply Branch Ruleset (Admin)

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'Repository owner (username/org)'
        required: true
      repo:
        description: 'Repository name'
        required: true
      status_check:
        description: 'Exact PR status check name (optional)'
        required: false

permissions:
  contents: read
  actions: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout admin repo
        uses: actions/checkout@v4

      - name: Ensure script is present
        run: |
          ls -la scripts || true
          chmod +x ./scripts/apply_ruleset.sh

      - name: Run apply_ruleset script
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_PAT }}   # ensure this secret exists in the admin repo
        run: |
          ./scripts/apply_ruleset.sh "${{ github.event.inputs.owner }}" "${{ github.event.inputs.repo }}" "${{ github.event.inputs.status_check }}"
